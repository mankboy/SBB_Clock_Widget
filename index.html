<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBB Clock Widget</title>
<style>
  :root {
    --clock-bg: #ffffff;
    --clock-border: #C0C0C0;
    --hand-color: #000000;
    --sec-color: #EB0000;
    --clock-shadow: 0 0 24px rgba(0,0,0,0.15);
    --hand-shadow-opacity: 0.2;
  }

  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .clock-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .clock-outer {
    filter: drop-shadow(var(--clock-shadow));
  }

  .clock-container {
    width: 300px;
    height: 300px;
    box-sizing: content-box;
    background: var(--clock-bg);
    border-radius: 50%;
    border: 18px solid var(--clock-border);
    position: relative;
    clip-path: circle(50% at center);
    overflow: hidden;
  }

  .dial {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  .mark {
    position: absolute;
    background: var(--hand-color);
    left: 50%;
    top: 8px;
    transform-origin: 50% 142px; /* 150px center minus 8px top offset */
  }

  .mark.minute { width: 4px; height: 10px; margin-left: -2px; }
  .mark.hour { width: 11px; height: 36px; margin-left: -5.5px; }

  .hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    background: var(--hand-color);
    transform-origin: 50% 100%;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0, var(--hand-shadow-opacity, 0.2)));
  }

  /* Hour hand: 90px above center + 22px tail below, bold taper */
  .hand.hour {
    width: 20px;
    height: 112px;
    margin-left: -10px;
    bottom: 42.7%;
    transform-origin: 50% 80.4%;
    z-index: 1;
    clip-path: polygon(10% 0%, 90% 0%, 100% 80%, 100% 100%, 0% 100%, 0% 80%);
  }

  /* Minute hand: 125px above center + 28px tail below, bold taper */
  .hand.minute {
    width: 18px;
    height: 165px;
    margin-left: -9px;
    bottom: 39.9%;
    transform-origin: 50% 81.7%;
    z-index: 2;
    clip-path: polygon(12% 0%, 88% 0%, 100% 82%, 100% 100%, 0% 100%, 0% 82%);
    transition: transform 0.2s cubic-bezier(0.4, 2.08, 0.55, 0.44);
  }

  /* Second hand: 105px above center + 39px tail below */
  .hand.second {
    width: 4px;
    height: 144px;
    margin-left: -2px;
    background: var(--sec-color);
    transform-origin: 50% 73%;
    bottom: 37.2%;
    z-index: 3;
    filter: none;
  }

  /* The iconic red circle at the tip */
  .hand.second::after {
    content: '';
    position: absolute;
    width: 26px;
    height: 26px;
    background: var(--sec-color);
    border-radius: 50%;
    top: -13px;
    left: -11px;
  }

  /* Shadow elements hidden — using CSS drop-shadow on .hand instead */
  .hand.shadow {
    display: none;
  }

  .center-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    background: var(--sec-color);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 4;
  }

  .clock-logo {
    position: absolute;
    top: 33%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100px;
    height: auto;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
  }

  /* Variant picker — shown in browser, non-interactive in Plash */
  .variant-picker {
    display: flex;
    gap: 10px;
    align-items: center;
    position: relative;
    z-index: 100;
  }

  .variant-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    padding: 0;
    position: relative;
    transition: transform 0.15s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .variant-btn:hover { transform: scale(1.15); }

  .variant-btn.active {
    border-color: var(--sec-color, #EB0000);
  }

  .variant-btn .swatch-inner {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .shadow-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    padding: 0;
    background: #f0f0f0;
    transition: transform 0.15s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    font-size: 14px;
    line-height: 32px;
    text-align: center;
    color: #555;
    margin-left: 6px;
  }

  .shadow-btn:hover { transform: scale(1.15); }
  .shadow-btn.active { border-color: var(--sec-color, #EB0000); }

  .url-hint {
    font-size: 11px;
    color: #999;
    text-align: center;
    max-width: 320px;
    line-height: 1.4;
  }

  /* Right-click context menu */
  .context-menu {
    display: none;
    position: fixed;
    background: rgba(30, 30, 30, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 10px;
    padding: 6px 0;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 200;
    font-size: 13px;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .context-menu.visible {
    display: block;
  }

  .context-menu-item {
    padding: 6px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .context-menu-item:hover {
    background: rgba(255,255,255,0.12);
  }

  .context-menu-item.active {
    font-weight: 600;
  }

  .context-menu-item .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
  }

  .context-menu-item .check {
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }

  .context-menu-separator {
    height: 1px;
    background: rgba(255,255,255,0.12);
    margin: 4px 0;
  }

  .context-menu-label {
    padding: 4px 16px 2px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="clock-wrapper">
  <div class="clock-outer"><div class="clock-container">
    <div class="dial" id="dial"></div>
    <svg class="clock-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 84 192.756 26"><g fill-rule="evenodd" clip-rule="evenodd"><path fill="#b74243" d="M2.834 106.246h59.203V86.511H2.834v19.735z"/><path fill="#fff" d="M48.324 89.803l5.489 4.93-6.577.001v-4.933h-3.289l-.001 4.933-6.576-.001 5.49-4.93h-3.848l-6.577 6.576 6.579 6.578h3.848l-5.492-4.936h6.576l.001 4.934h3.289v-4.934h6.577l-5.491 4.936h3.847l6.58-6.578-6.578-6.576h-3.847z"/><path fill="var(--hand-color)" d="M71.231 99.432c0 1.691 1.067 2.393 2.971 2.393 1.064 0 2.86-.293 2.86-1.947 0-1.426-1.576-1.682-4.146-2.262-2.511-.564-4.103-1.454-4.103-4.045 0-2.827 2.486-4.268 5.177-4.268 2.883 0 5.078 1.183 5.363 4.342h-2.545c-.234-1.603-1.388-2.08-2.84-2.08-1.371 0-2.443.619-2.443 1.779 0 1.199.904 1.564 3.865 2.112 1.775.329 4.456 1.032 4.456 4.167 0 2.463-2.082 4.465-5.604 4.465-3.057 0-5.512-1.416-5.656-4.656h2.645zM81.939 89.801h6.048c2.421 0 4.336 1.023 4.336 3.559 0 1.503-.915 2.296-2.114 2.875 1.684.484 2.624 2.203 2.624 3.604 0 2.256-1.724 3.779-4.289 3.779H81.94V89.801h-.001zm2.637 11.662h2.914c1.376 0 2.552-.584 2.552-1.967 0-1.508-1.013-2.08-2.368-2.08h-3.098v4.047zm0-6.091h2.971c1.147 0 2.149-.523 2.149-1.774 0-1.418-1.232-1.71-2.4-1.71h-2.72v3.484zM95.187 89.801h6.048c2.42 0 4.336 1.023 4.336 3.559 0 1.503-.914 2.296-2.113 2.875 1.682.484 2.623 2.203 2.623 3.604 0 2.256-1.725 3.779-4.291 3.779h-6.603V89.801zm2.637 11.662h2.912c1.377 0 2.551-.584 2.551-1.967 0-1.508-1.012-2.08-2.365-2.08h-3.098v4.047zm0-6.091h2.969c1.146 0 2.15-.523 2.15-1.774 0-1.418-1.232-1.71-2.4-1.71h-2.719v3.484zM125.191 99.221c-.363 3.047-2.736 4.889-5.9 4.889-3.994 0-6.627-3.471-6.627-7.457 0-4.103 2.279-7.428 6.627-7.428 2.906 0 5.238 1.651 5.715 4.75h-2.688c-.244-1.319-1.338-2.437-3.027-2.437-2.73 0-3.795 2.378-3.795 5.006 0 2.43 1.289 5.234 3.854 5.234 1.641 0 2.771-.908 3.094-2.557h2.747zM127.184 89.795h9.605v2.289h-6.887v3.455h5.903v2.221h-5.903v5.851h-2.718V89.795zM138.846 89.795h9.607v2.289h-6.889v3.455h5.905v2.221h-5.905v5.851h-2.718V89.795zM155.719 89.795h9.605v2.289h-6.886v3.455h5.902v2.221h-5.902v5.851h-2.719V89.795zM167.438 89.795h9.607v2.289h-6.891v3.455h5.905v2.221h-5.905v5.851h-2.716V89.795zM181.307 99.432c0 1.691 1.068 2.393 2.971 2.393 1.064 0 2.859-.293 2.859-1.947 0-1.426-1.576-1.682-4.145-2.262-2.512-.564-4.104-1.454-4.104-4.045 0-2.827 2.486-4.268 5.178-4.268 2.885 0 5.078 1.183 5.363 4.342h-2.545c-.234-1.603-1.389-2.08-2.84-2.08-1.371 0-2.443.619-2.443 1.779 0 1.199.902 1.564 3.865 2.112 1.775.329 4.455 1.032 4.455 4.167 0 2.463-2.082 4.465-5.605 4.465-3.057 0-5.512-1.416-5.654-4.656h2.645z"/></g></svg>
    <div class="hand hour shadow" id="hourShadow"></div>
    <div class="hand minute shadow" id="minuteShadow"></div>
    <div class="hand second shadow" id="secondShadow"></div>
    <div class="hand hour" id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
    <div class="hand second" id="secondHand"></div>
    <div class="center-dot"></div>
  </div></div>

  <div class="variant-picker" id="variantPicker"></div>
  <div class="url-hint" id="urlHint"></div>
  <div class="context-menu" id="contextMenu"></div>
</div>

<script>
  // Draw the dial marks
  const dial = document.getElementById('dial');
  for (let i = 0; i < 60; i++) {
    const mark = document.createElement('div');
    mark.className = `mark ${i % 5 === 0 ? 'hour' : 'minute'}`;
    mark.style.transform = `rotate(${i * 6}deg)`;
    dial.appendChild(mark);
  }

  const hourHand = document.getElementById('hourHand');
  const minuteHand = document.getElementById('minuteHand');
  const secondHand = document.getElementById('secondHand');
  const hourShadow = document.getElementById('hourShadow');
  const minuteShadow = document.getElementById('minuteShadow');
  const secondShadow = document.getElementById('secondShadow');

  // --- Variant definitions matching Mondaine SBB commerce range ---
  const variants = {
    classic: { name: 'Classic (Silver)',  border: '#C0C0C0', bg: '#ffffff', hand: '#000000', sec: '#EB0000' },
    white:   { name: 'Pure White',        border: '#E8E8E8', bg: '#ffffff', hand: '#000000', sec: '#EB0000' },
    black:   { name: 'Black',             border: '#222222', bg: '#ffffff', hand: '#000000', sec: '#EB0000' },
    dark:    { name: 'Dark',              border: '#222222', bg: '#111111', hand: '#ffffff', sec: '#EB0000' },
    red:     { name: 'Stop2Go Red',       border: '#EB0000', bg: '#ffffff', hand: '#000000', sec: '#EB0000' },
    gold:    { name: 'Gold',              border: '#C5A55A', bg: '#ffffff', hand: '#C5A55A', sec: '#EB0000' },
    copper:  { name: 'Copper',            border: '#B87333', bg: '#ffffff', hand: '#B87333', sec: '#EB0000' },
    silver:  { name: 'Silver Tone',       border: '#A8A8A8', bg: '#ffffff', hand: '#A8A8A8', sec: '#EB0000' }
  };

  const shadowPresets = {
    light:  { name: 'Light shadow',  clock: '0 0 12px rgba(0,0,0,0.1)',  handOpacity: '0.1',  label: '○' },
    medium: { name: 'Medium shadow', clock: '0 0 24px rgba(0,0,0,0.15)', handOpacity: '0.2',  label: '◐' },
    heavy:  { name: 'Heavy shadow',  clock: '0 0 36px rgba(0,0,0,0.25)', handOpacity: '0.3', label: '●' },
    none:   { name: 'No shadow',     clock: 'none',                         handOpacity: '0',    label: '◌' }
  };
  const shadowKeys = Object.keys(shadowPresets);

  // --- Read config from URL query parameters ---
  const params = new URLSearchParams(window.location.search);
  let currentVariant = params.get('variant') || 'black';
  let currentShadow = params.get('shadow') || 'medium';

  // Validate
  if (!variants[currentVariant]) currentVariant = 'classic';
  if (!shadowPresets[currentShadow]) currentShadow = 'medium';

  // --- Apply variant ---
  function applyVariant(id) {
    const v = variants[id];
    if (!v) return;
    currentVariant = id;

    const root = document.documentElement;
    root.style.setProperty('--clock-bg', v.bg);
    root.style.setProperty('--clock-border', v.border);
    root.style.setProperty('--hand-color', v.hand);
    root.style.setProperty('--sec-color', v.sec);

    document.querySelectorAll('.variant-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.variant === id);
    });

    updateURL();
  }

  function applyShadow(id) {
    const s = shadowPresets[id];
    if (!s) return;
    currentShadow = id;
    document.documentElement.style.setProperty('--clock-shadow', s.clock);
    document.documentElement.style.setProperty('--hand-shadow-opacity', s.handOpacity);
    updateURL();
  }

  // --- Update URL so user can copy it for Plash ---
  function updateURL() {
    const url = new URL(window.location);
    url.searchParams.set('variant', currentVariant);
    url.searchParams.set('shadow', currentShadow);
    history.replaceState(null, '', url);

    // Show the URL hint
    const hint = document.getElementById('urlHint');
    hint.textContent = 'Copy this page URL to use in Plash';
  }

  // --- Build picker UI ---
  const picker = document.getElementById('variantPicker');

  Object.entries(variants).forEach(([id, v]) => {
    const btn = document.createElement('button');
    btn.className = 'variant-btn' + (id === currentVariant ? ' active' : '');
    btn.title = v.name;
    btn.style.background = v.border;
    btn.dataset.variant = id;

    const inner = document.createElement('span');
    inner.className = 'swatch-inner';
    inner.style.background = v.bg;
    btn.appendChild(inner);

    btn.addEventListener('click', () => applyVariant(id));
    picker.appendChild(btn);
  });

  // Shadow cycle button
  let shadowIndex = shadowKeys.indexOf(currentShadow);
  const shadowBtn = document.createElement('button');
  shadowBtn.className = 'shadow-btn';
  shadowBtn.title = shadowPresets[currentShadow].name;
  shadowBtn.textContent = shadowPresets[currentShadow].label;
  shadowBtn.addEventListener('click', () => {
    shadowIndex = (shadowIndex + 1) % shadowKeys.length;
    const id = shadowKeys[shadowIndex];
    applyShadow(id);
    shadowBtn.title = shadowPresets[id].name;
    shadowBtn.textContent = shadowPresets[id].label;
  });
  picker.appendChild(shadowBtn);

  // --- Apply initial config from URL params ---
  applyVariant(currentVariant);
  applyShadow(currentShadow);

  // --- Clock animation ---
  let secHandPaused = false;

  function updateClock() {
    const now = new Date();

    const ms = now.getMilliseconds();
    const s = now.getSeconds();
    const m = now.getMinutes();
    const h = now.getHours() % 12;

    // SBB specific logic:
    // The second hand completes a revolution in 58.5 seconds,
    // then pauses at 12 o'clock for the remaining 1.5 seconds.
    const exactSeconds = s + (ms / 1000);
    const isPaused = exactSeconds > 58.5;
    const secDegrees = isPaused ? 360 : (exactSeconds / 58.5) * 360;

    // Handle the pause→sweep transition
    if (secHandPaused && !isPaused) {
      // Instantly reset to 0 (no backward spin from 360→0)
      secondHand.style.transition = 'none';
      secondHand.style.transform = 'rotate(0deg)';
      secondShadow.style.transition = 'none';
      secondShadow.style.transform = 'rotate(0deg)';
      void secondHand.offsetHeight; // force reflow
      // Apply bounce flick for the resuming snap
      const flick = 'transform 0.6s cubic-bezier(0.2, 2.5, 0.4, 0.8)';
      secondHand.style.transition = flick;
      secondShadow.style.transition = flick;
      setTimeout(() => {
        secondHand.style.transition = 'none';
        secondShadow.style.transition = 'none';
      }, 600);
    }
    secHandPaused = isPaused;

    // Minute jumps cleanly (SBB minutes only move when second hand reaches 12)
    const minDegrees = m * 6;

    // Hour hand moves smoothly throughout the hour
    const hourDegrees = (h * 30) + (m * 0.5);

    secondHand.style.transform = `rotate(${secDegrees}deg)`;
    minuteHand.style.transform = `rotate(${minDegrees}deg)`;
    hourHand.style.transform = `rotate(${hourDegrees}deg)`;
    secondShadow.style.transform = `rotate(${secDegrees}deg)`;
    minuteShadow.style.transform = `rotate(${minDegrees}deg)`;
    hourShadow.style.transform = `rotate(${hourDegrees}deg)`;

    requestAnimationFrame(updateClock);
  }

  // --- Context menu ---
  const ctxMenu = document.getElementById('contextMenu');

  function buildContextMenu() {
    ctxMenu.innerHTML = '';
    const MENU_EDGE_MARGIN = 4;

    const varLabel = document.createElement('div');
    varLabel.className = 'context-menu-label';
    varLabel.textContent = 'Color Variant';
    ctxMenu.appendChild(varLabel);

    Object.entries(variants).forEach(([id, v]) => {
      const item = document.createElement('div');
      item.className = 'context-menu-item' + (id === currentVariant ? ' active' : '');
      const check = document.createElement('span');
      check.className = 'check';
      check.textContent = id === currentVariant ? '\u2713' : '';
      const swatch = document.createElement('span');
      swatch.className = 'swatch';
      swatch.style.background = v.bg !== '#ffffff'
        ? 'linear-gradient(135deg, ' + v.border + ' 50%, ' + v.bg + ' 50%)'
        : v.border;
      const label = document.createElement('span');
      label.textContent = v.name;
      item.appendChild(check);
      item.appendChild(swatch);
      item.appendChild(label);
      item.addEventListener('click', () => { applyVariant(id); hideContextMenu(); });
      ctxMenu.appendChild(item);
    });

    const sep = document.createElement('div');
    sep.className = 'context-menu-separator';
    ctxMenu.appendChild(sep);

    const shadLabel = document.createElement('div');
    shadLabel.className = 'context-menu-label';
    shadLabel.textContent = 'Shadow';
    ctxMenu.appendChild(shadLabel);

    Object.entries(shadowPresets).forEach(([id, s]) => {
      const item = document.createElement('div');
      item.className = 'context-menu-item' + (id === currentShadow ? ' active' : '');
      const check = document.createElement('span');
      check.className = 'check';
      check.textContent = id === currentShadow ? '\u2713' : '';
      const label = document.createElement('span');
      label.textContent = s.name;
      item.appendChild(check);
      item.appendChild(label);
      item.addEventListener('click', () => { applyShadow(id); hideContextMenu(); });
      ctxMenu.appendChild(item);
    });
  }

  function showContextMenu(x, y) {
    buildContextMenu();
    ctxMenu.style.left = x + 'px';
    ctxMenu.style.top = y + 'px';
    ctxMenu.classList.add('visible');
    const rect = ctxMenu.getBoundingClientRect();
    if (rect.right > window.innerWidth) ctxMenu.style.left = (window.innerWidth - rect.width - MENU_EDGE_MARGIN) + 'px';
    if (rect.bottom > window.innerHeight) ctxMenu.style.top = (window.innerHeight - rect.height - MENU_EDGE_MARGIN) + 'px';
  }

  function hideContextMenu() {
    ctxMenu.classList.remove('visible');
  }

  document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    showContextMenu(e.clientX, e.clientY);
  });

  document.addEventListener('click', (e) => {
    if (!ctxMenu.contains(e.target)) hideContextMenu();
  });

  // Initialize
  updateClock();
</script>

</body>
</html>
